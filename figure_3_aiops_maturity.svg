<svg width="100%" viewBox="0 0 760 320" role="img" font-family="Georgia, 'Times New Roman', serif" style="" xmlns="http://www.w3.org/2000/svg"><title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Figure 3 — The four layers of AIOps</title><desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">AIOps has four layers. Signal collection is done. Signal correlation is partial and pre-selected. Signal discovery is not yet built. Causation inference is partial via LLM.</desc>
